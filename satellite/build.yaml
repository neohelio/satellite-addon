# Supervisor uses this to pick the right base image per-arch when running
# `docker buildx build --build-arg BUILD_FROM=...`. Without it the Dockerfile's
# `FROM $BUILD_FROM` resolves to empty and the build aborts.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21
  amd64:   ghcr.io/home-assistant/amd64-base:3.21
labels:
  org.opencontainers.image.title: NeoHelio Satellite
  org.opencontainers.image.description: HA add-on that streams telemetry to NeoHelio
  org.opencontainers.image.source: https://github.com/neohelio/satellite-addon
  org.opencontainers.image.licenses: Proprietary
