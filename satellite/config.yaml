# Orbit Satellite — Home Assistant Add-on manifest.
# https://developers.home-assistant.io/docs/add-ons/configuration/
# Note: `slug` (and the underlying repo dir) stays as-is so existing HA installs
# don't see the add-on as removed-and-readded after the rename.
name: Orbit Satellite
version: "0.1.8"
slug: neohelio_satellite
description: Streams Home Assistant telemetry to Orbit for fleet-level performance, financial, and SLA analytics.
url: https://github.com/neohelio/satellite-addon
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
hassio_api: true
homeassistant_api: true
host_network: false
ports: {}
# Mount HA's config folder so the add-on can drop the NeoHelio frontend
# theme into /config/themes/ on first start. Read+write.
map:
  - config:rw
options:
  site_token: ""
  gateway_serial: ""
  neohelio_url: "https://api.neohelio.io"
  ingest_url: ""
  realtime_relay_url: ""
  poll_interval_sec: 5
  log_level: "info"
schema:
  site_token: str
  gateway_serial: str
  neohelio_url: url
  ingest_url: str?
  # Live tee (Phase 1). Empty = derive wss:// from neohelio_url (correct in
  # prod where api + relay share a host). In dev where the relay is a
  # separate Cloud Run service, paste its wss:// URL here, or "disabled"
  # to skip the live tee entirely (slow NDJSON path keeps working).
  realtime_relay_url: str?
  poll_interval_sec: int(1,300)
  log_level: list(debug|info|warning|error)
panel_icon: mdi:satellite-variant
panel_title: NeoHelio
ingress: false
