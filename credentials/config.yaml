# NeoHelio Credentials — Home Assistant Add-on manifest.
# https://developers.home-assistant.io/docs/add-ons/configuration/
#
# This is the bootstrap addon. Customers install it BEFORE the Satellite
# addon. Its job is to register short-lived Artifact Registry pull tokens
# with HA Supervisor so the Satellite addon's private image (hosted on
# africa-south1-docker.pkg.dev) can be pulled.
#
# How it works:
#   1. Reads site_token + gateway_serial from add-on options (same values
#      operators paste into the Satellite addon).
#   2. POSTs to NeoHelio /api/v1/edge-gateways/:serial/registry-token with HMAC
#      site_token auth. Receives a 1-hour Artifact Registry OAuth access
#      token.
#   3. POSTs the token to HA Supervisor's /docker/registries endpoint,
#      registering it for `africa-south1-docker.pkg.dev`.
#   4. Sleeps until ~5 min before the token expires, then repeats.
#
# No `image:` field intentionally. This addon's Dockerfile lives in the
# same metadata repo customers add to HA, so HA Supervisor builds it
# locally on the Pi. That's the chicken-and-egg solution — this addon
# can't itself require pre-built-image auth, since the auth depends on
# it running.
#
# The source is genuinely trivial (a credential refresh loop, no NeoHelio
# IP) so being built-from-source on every Pi is a non-issue.

name: NeoHelio Credentials
version: "0.1.2"
slug: neohelio_credentials
description: One-time bootstrap that registers short-lived Artifact Registry tokens with HA Supervisor, so the Satellite addon's private image can be pulled.
url: https://github.com/neohelio/satellite-addon

# Architecture support — same as the main Satellite addon. The Python +
# stdlib `urllib.request` stack works on all of these without compiled
# native deps.
arch:
  - aarch64
  - amd64

# Lifecycle. `init: false` means we don't get s6-overlay (we don't need
# multi-process supervision). `startup: services` runs after the network
# stack is up. `boot: auto` makes it restart with HA Supervisor.
init: false
startup: services
boot: auto

# Supervisor API access. We use this to register Docker registry
# credentials via POST /docker/registries. That endpoint requires the
# `admin` Supervisor role — the default role can only read/write the
# addon's own state, not Supervisor-wide settings.
hassio_api: true
hassio_role: admin
homeassistant_api: false
host_network: false
ports: {}

# Options operator pastes in. Same site_token + gateway_serial they'll
# also paste into the Satellite addon — keeps the install flow simple.
options:
  site_token: ""
  gateway_serial: ""
  neohelio_url: "https://api.neohelio.io"
  registry_host: "africa-south1-docker.pkg.dev"
  refresh_buffer_sec: 300
  log_level: "info"

schema:
  site_token: str
  gateway_serial: str
  neohelio_url: url
  registry_host: str
  # Margin before expiry at which we refresh. 300 = 5 min. Min 60 to
  # guard against pathological short-lived tokens; max 1800 (30 min) so
  # we never sleep longer than half the typical token lifetime.
  refresh_buffer_sec: int(60,1800)
  log_level: list(debug|info|warning|error)

panel_icon: mdi:key-chain
panel_title: NeoHelio Credentials
ingress: false
