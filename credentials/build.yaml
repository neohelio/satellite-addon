# HA Supervisor uses this to pick the per-arch base image when building
# locally on the Pi (no `image:` in config.yaml means the build happens
# every install). Matching the bases used by the main Satellite addon so
# this addon doesn't introduce extra base-image churn.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21
  amd64:   ghcr.io/home-assistant/amd64-base:3.21

labels:
  org.opencontainers.image.title: NeoHelio Credentials
  org.opencontainers.image.description: Bootstrap addon that registers short-lived Artifact Registry pull tokens with HA Supervisor.
  org.opencontainers.image.source: https://github.com/neohelio/satellite-addon
  org.opencontainers.image.licenses: Proprietary
